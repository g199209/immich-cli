# Copy to ~/.config/immich-cli/config.toml and fill in your values.

server_url = "http://your-immich-host:2283"
api_key    = "your-immich-api-token"

# One or more mappings from Immich server-side paths to local mounts.
# The first prefix that matches an asset's originalPath wins.
[[path_map]]
server = "/mnt/qnap-photos"
local  = "~/QNAP-Photos"

# Optional: HTTP request timeout in seconds. Defaults to 60.
# timeout_secs = 60

# Optional: LLM endpoint used by `ask` (text) and `update-descriptions`
# (vision). Any OpenAI-compatible /v1/chat/completions gateway works
# (OneAPI, LiteLLM, Ollama's OpenAI shim, OpenAI itself, ...).
# [llm]
# base_url     = "http://10.42.1.26:3000"
# api_key      = "sk-..."
# model        = "deepseek-v4-flash"   # text model, for `ask`
# vision_model = "mimo-v2.5"           # vision model, for `update-descriptions`
# timeout_secs = 120

# Optional: Immich face-recognition names to relationship labels used by
# `update-descriptions`. Only names listed here are sent to the captioning
# prompt; every other detected face is ignored.
# [people]
